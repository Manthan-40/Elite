Screens:
  Requests Screen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext({IsRequestScreenLoaderVisible: true});
        //Set(RequestsData, Requests);

        UpdateContext( { IsRequestPopupFormVisible: false, IsRequestScreenLoaderVisible:false, IsDisplayImage:false, SelectedImage: Blank()} );

        With(
            {
                FilterdData: Switch(
                    SelectedMenu.Name,
                    Blank(),Filter('Request Types',Status = 'Status (Request Types)'.Active),
                    "Housekeeping",Filter('Request Types','Is Visible For Housekeeping?',Status = 'Status (Request Types)'.Active),
                    "Inspection",Filter('Request Types','Is Visible For Inspection?',Status = 'Status (Request Types)'.Active),
                    "Maintenance Jobs",Filter('Request Types','Is Visible For Maintenance Jobs?',Status = 'Status (Request Types)'.Active),
                    "Meter Readings",Filter('Request Types','Is Visible For Meter Readings?',Status = 'Status (Request Types)'.Active),
                    "Safety Tests",Filter('Request Types','Is Visible For Safety Test?',Status = 'Status (Request Types)'.Active),
                    "Services",Filter('Request Types','Is Visible For Services?',Status = 'Status (Request Types)'.Active),
                    "Site Tasks",Filter('Request Types','Is Visible For Site Task?',Status = 'Status (Request Types)'.Active)
                )
            },
            If(
                CountRows(FilterdData) <> 0,
                ClearCollect(
                    RequestOptionset,
                    {
                        elt_name: "--Select--",
                        elt_requesttypeid: Blank()
                    },
                    ShowColumns(
                        FilterdData, Name, 'Request Type'
                    )
                ),
                ClearCollect(
                    RequestOptionset,
                    {
                        elt_name: "No types found",
                        elt_requesttypeid: Blank()
                    }
                )
            )
        );

        //UpdateContext({FilteredRequests :  Filter(RequestsData,Regarding = RecordofRequests)});
        //UpdateContext({CurrentRecordforRequest : LookUp('Site Tasks', 'Site Tasks' = RecordofRequests.'Maintenance Job')});

        Switch(
            SelectedMenu.Name,
            Blank(),
            UpdateContext({FilteredRequests :  Filter(Requests, And('IsGlobalRequest?', 'Owning User'.User=CurrentUser.User,Status='Status (Requests)'.Active))});
            UpdateContext({CurrentRecordforRequest : Blank()}),
            "Site Tasks",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_housekeeping_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp('Site Tasks', 'Site Task' = RecordofRequests.elt_sitetaskid)}),
            "Safety Tests",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_safetytest_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp('Safety Tests', 'Safety Test' = RecordofRequests.elt_safetytestid)}),
            "Maintenance Jobs",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_maintenancejob_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp('Maintenance Jobs', 'Maintenance Job' = RecordofRequests.elt_maintenancejobid)}),
            "Services",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_service_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp(Services_1, Service = RecordofRequests.elt_serviceid)}),
            "Housekeeping",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_housekeeping_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp(Housekeeping_1, Housekeeping = RecordofRequests.elt_housekeepingid)}),
            "Meter Readings",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_meterreading_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp('Meter Readings', 'Meter Reading' = RecordofRequests.elt_meterreadingid)}),
            "Inspection",
            UpdateContext({FilteredRequests :  RecordofRequests.elt_elt_request_elt_inspection_elt_RegardingId});
            UpdateContext({CurrentRecordforRequest : LookUp(Inspections, Inspection = RecordofRequests.elt_inspectionid)})
        );

        //Set(NoteData, Notes);
        /*ClearCollect(
            uplodedImage,
            {Image:""}
        );*/
        Clear(NewMaintenanceUplodedImage);
        UpdateContext({IsRequestScreenLoaderVisible: false});
    Children:
