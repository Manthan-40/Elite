                                    If(
                                        'Comment Screen'.Width >= 1300,
                                        34,
                                        28
                                    ),
                                    34
                                )
                              Text: |+
                                =    Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.btnComplete), "Complete")
