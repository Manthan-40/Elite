                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          RadiusBottomLeft: =Self.RadiusTopLeft
                                          RadiusBottomRight: =Self.RadiusTopLeft
                                          RadiusTopLeft: =Self.Height*0.3
                                          RadiusTopRight: =Self.RadiusTopLeft
                                          Width: =If (TaskDashboardScreen.Size <= ScreenSize.Small , 70 ,TaskDashboardScreen.Size <= ScreenSize.Medium,100,130)
                                        Children:
                                          - Comment_Add_Button_3:
                                              Control: Button@0.0.45
                                              Properties:
                                                Align: =Align.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                BasePaletteColor: =RGBA(255, 255, 255, 1)
                                                BorderColor: =Theme_OnStart.Colors.SecondaryColor
                                                BorderRadius: =Self.Height*0.3
                                                BorderStyle: =BorderStyle.None
                                                BorderThickness: =0
                                                FontColor: =RGBA(255, 255, 255, 1)
                                                FontSize: =If (HomeScreen.Size <= ScreenSize.Small , 40 ,HomeScreen.Size <= ScreenSize.Medium,55,70)
                                                FontWeight: =FontWeight.Bold
                                                Height: =Self.Width
                                                Icon: ="ArrowSort"
                                                IconStyle: ='ButtonCanvas.IconStyle'.Filled
                                                OnSelect: |-
                                                  =UpdateContext( { IsSelectionOptionsVisible : true} )
                                                Text: =
                                                Width: =Parent.Width
                              - Search Bar Container:
                                  Control: GroupContainer@1.5.0
                                  Variant: ManualLayout
                                  Properties:
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                  Children:
                                    - Container29:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          Fill: =RGBA(255, 255, 255, 1)
                                          Height: |-
                                            =//If(HomeScreen.Size <= ScreenSize.Small ,75 ,HomeScreen.Size <= ScreenSize.Large,If(HomeScreen.Width >= 1300,125,100),125)
                                            If(
                                                HomeScreen.Size <= ScreenSize.Small,
                                                80,
                                                If(
                                                    HomeScreen.Size <= ScreenSize.Medium,
                                                    125,
                                                    150
                                                )
                                            )
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
