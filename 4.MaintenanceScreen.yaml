                                          RadiusBottomRight: =15
                                          RadiusTopLeft: =15
                                          RadiusTopRight: =15
                                          Width: |-
                                            =If(
                                                HomeScreen.Size <= ScreenSize.Small,
                                                Parent.Width - 50,
                                                HomeScreen.Size <= ScreenSize.Large,
                                                Parent.Width - 100,
                                                 Parent.Width - 150
                                            )
                                          X: =(Parent.Width - Self.Width)/2
                                          Y: =(Parent.Height-Self.Height)*0.4
                                        Children:
                                          - Icon10:
                                              Control: Icon@0.0.7
                                              Properties:
                                                Height: =Parent.Height
                                                Icon: ="Search"
                                                IconColor: =RGBA(0, 0, 0, 0.5)
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                Width: |+
                                                  =If(HomeScreen.Size <= ScreenSize.Small ,50 ,HomeScreen.Size <= ScreenSize.Large,If(HomeScreen.Width >= 1300,65,60),65)

                                          - TextInputCanvas3:
                                              Control: TextInput@0.0.54
                                              Properties:
                                                Appearance: ='TextInputCanvas.Appearance'.FilledLighter
                                                FillPortions: =1
                                                FontColor: =EliteTheme.Colors.Body_UI.TextPrimary
                                                FontSize: |+
                                                  =If(HomeScreen.Size <= ScreenSize.Small ,25 ,HomeScreen.Size <= ScreenSize.Large,If(HomeScreen.Width >= 1300,50,35),45)

                                                Height: =Parent.Height
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                OnChange: =
                                                PaddingLeft: =10
                                                Placeholder: =Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.phSearch),"Search...")
