Screens:
  MaintenanceScreen:
    Properties:
      Fill: =EliteTheme.Colors.Body_UI.BackgroundLight
      ImagePosition: =ImagePosition.Tile
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnHidden: |-
        =Reset(TextInputCanvas3);
        UpdateContext({selectedInspectionTask:Blank(),TaskListToUpdate:Blank()});
        UpdateContext({FilterRecordsToDisplay : Blank()});
        UpdateContext({IsRequestScreenLoaderVisible : true,sortByColumn : Blank(),IsSelectionOptionsVisible: false});
        UpdateContext({NoRecordsText : ""});
        UpdateContext({varResetSlider:false});
      OnVisible: |+
        =UpdateContext({IsRequestScreenLoaderVisible:true,NoRecordsText : "",sortByColumn : Blank(),IsSelectionOptionsVisible: false});

        Reset(TextInputCanvas3);
        UpdateContext({SelectedUnitCode:""});

        Switch(
            SelectedMenu.Name,
            "Site Tasks",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter('Site Tasks', !IsBlank('Site Task') && 'Site Task' <> GUID(), Status = 'Status (Site Tasks)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter('Site Tasks', !IsBlank('Site Task') && 'Site Task' <> GUID(), Status = 'Status (Site Tasks)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Safety Tests",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter('Safety Tests', !IsBlank('Safety Test') && 'Safety Test' <> GUID() ,Status = 'Status (Safety Tests)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter('Safety Tests', !IsBlank('Safety Test') && 'Safety Test' <> GUID() ,Status = 'Status (Safety Tests)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Maintenance Jobs",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter('Maintenance Jobs', !IsBlank('Maintenance Job') && 'Maintenance Job' <> GUID(),Status = 'Status (Maintenance Jobs)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter('Maintenance Jobs', !IsBlank('Maintenance Job') && 'Maintenance Job' <> GUID(),Status = 'Status (Maintenance Jobs)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Services",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter(Services_1, !IsBlank(Service) && Service <> GUID(),Status = 'Status (Services_1)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter(Services_1, !IsBlank(Service) && Service <> GUID(),Status = 'Status (Services_1)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Housekeeping",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter(Housekeeping_1, !IsBlank(Housekeeping) && Housekeeping <> GUID(),Status = 'Status (Housekeeping_1)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter(Housekeeping_1, !IsBlank(Housekeeping) && Housekeeping <> GUID(),Status = 'Status (Housekeeping_1)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Meter Readings",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter('Meter Readings', !IsBlank('Meter Reading') && 'Meter Reading' <> GUID(),Status = 'Status (Meter Readings)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter('Meter Readings', !IsBlank('Meter Reading') && 'Meter Reading' <> GUID(),Status = 'Status (Meter Readings)'.Active,'Owning User'.User = CurrentUser.User)})
            ),
            "Inspection",
            If(TaskDashboard_TaskFilter_Toggle.Value, 
                UpdateContext({DefaultCurrentRelatedTable : Filter(Inspections, !IsBlank(Inspection) && Inspection <> GUID(),Status = 'Status (Inspections)'.Active,'Owning Team'.Team in UserTeams.Team)}),
                UpdateContext({DefaultCurrentRelatedTable : Filter(Inspections, !IsBlank(Inspection) && Inspection <> GUID(),Status = 'Status (Inspections)'.Active,'Owning User'.User = CurrentUser.User)})
            )
        );

        Switch(
            Filter,
            "High Priority",
            UpdateContext({FilterRecordsToDisplay : Filter(DefaultCurrentRelatedTable, elt_priority = 1 && elt_taskstatus <> 4)}),
            "To Do",
            UpdateContext({FilterRecordsToDisplay : Filter(DefaultCurrentRelatedTable, !IsBlankOrError(
                            Switch(
                                SelectedMenu.Name,
                                "Site Tasks",
                                elt_duedate,
                                "Safety Tests",
                                elt_testdate,
                                "Maintenance Jobs",
                                elt_duedate,
                                "Services",
                                elt_startdate,
                                "Housekeeping",
                                elt_date,
                                "Inspection",
                                elt_date,
                                "Meter Readings",
                                elt_readingdate
                            )
                        ) && Switch(
                            SelectedMenu.Name,
                            "Site Tasks",
                            elt_duedate,
                            "Safety Tests",
                            elt_testdate,
                            "Maintenance Jobs",
                            elt_duedate,
                            "Services",
                            elt_startdate,
                            "Housekeeping",
                            elt_date,
                            "Inspection",
                            elt_date,
                                "Meter Readings",
                                elt_readingdate
                        ) <= DateAdd(Today(),86399,TimeUnit.Seconds) && elt_taskstatus <> 4)}),
            "Next 7 days",
            UpdateContext({FilterRecordsToDisplay : Filter(DefaultCurrentRelatedTable, !IsBlankOrError(
                            Switch(
                                SelectedMenu.Name,
                                "Site Tasks",
                                elt_duedate,
                                "Safety Tests",
                                elt_testdate,
                                "Maintenance Jobs",
                                elt_duedate,
                                "Services",
                                elt_startdate,
                                "Housekeeping",
                                elt_date,
                                "Inspection",
                                elt_date,
                                "Meter Readings",
                                elt_readingdate
                            )
                        ) && Switch(
                            SelectedMenu.Name,
                            "Site Tasks",
                            elt_duedate,
                            "Safety Tests",
                            elt_testdate,
                            "Maintenance Jobs",
                            elt_duedate,
                            "Services",
                            elt_startdate,
                            "Housekeeping",
                            elt_date,
                            "Inspection",
                            elt_date,
                                "Meter Readings",
                                elt_readingdate
                        ) >= DateAdd(Today(),1)
                         && Switch(
                            SelectedMenu.Name,
                            "Site Tasks",
                            elt_duedate,
                            "Safety Tests",
                            elt_testdate,
                            "Maintenance Jobs",
                            elt_duedate,
                            "Services",
                            elt_startdate,
                            "Housekeeping",
                            elt_date,
                            "Inspection",
                            elt_date,
                                "Meter Readings",
                                elt_readingdate
                        ) <= DateAdd(DateAdd(Today(), 7),86399,TimeUnit.Seconds),elt_taskstatus <> 4)}),
            "Completed",
            UpdateContext({FilterRecordsToDisplay : Filter(DefaultCurrentRelatedTable, elt_taskstatus = 4)}),
            "All",
            UpdateContext({FilterRecordsToDisplay : Filter(DefaultCurrentRelatedTable,elt_taskstatus <> 4)})
        );

        Set(CurrentCommentsData, Comments);
        UpdateContext({selectedInspectionTask:Blank(),TaskListToUpdate:Blank()});
        UpdateContext({IsRequestScreenLoaderVisible:false,NoRecordsText : "No records to display."});


        UpdateContext({varResetSlider:false});

        UpdateContext({IsVisibleConfirmPopupForm:false});

        UpdateContext({timerStart:false});
    Children:
      - MaintenanceScreenContainer:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
          Children:
            - MaintenanceHeaderContainer:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  FillPortions: =0
                  Height: |-
                    =If(HomeScreen.Size <= ScreenSize.Small ,
                        Parent.Height * 0.2
                     ,HomeScreen.Size <= ScreenSize.Medium,Parent.Height * 0.15,Parent.Height * 0.15)
                  LayoutMaxHeight: |-
                    =If(
                        HomeScreen.Size <= ScreenSize.Small,
                        250,
                        HomeScreen.Size <= ScreenSize.Large,
                        400,
                        500
                    )
                  RadiusBottomLeft: =40
                  RadiusBottomRight: =40
                  RadiusTopLeft: =
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - BackImage:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Height: =Parent.Height
                        Image: ='BG 1'
                        ImagePosition: =ImagePosition.Tile
                        Width: =Parent.Width
                  - Wrapper Container:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Height: =Parent.Height
                        Width: =Parent.Width
                      Children:
                        - Wrapper Inner Container:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Height: =Parent.Height
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =If(HomeScreen.Size <= ScreenSize.Small ,10 ,HomeScreen.Size <= ScreenSize.Large,20,30)
                              PaddingBottom: =8
                              PaddingLeft: =8
                              PaddingRight: =8
                              PaddingTop: =8
                              Width: =Parent.Width
                            Children:
                              - Back And Title:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =16
                                    PaddingBottom: =8
                                    PaddingLeft: =15
                                    PaddingRight: =15
                                    PaddingTop: =8
                                    X: =40
                                    Y: =40
                                  Children:
                                    - MaintenanceScreen_BackButton_Container:
                                        Control: GroupContainer@1.5.0
