                                                              "Meter Readings", Coalesce(Text(labels.lblMeterReadings), SelectedMenu.Name),
                                                              "Safety Tests", Coalesce(Text(labels.lblSafetyTests), SelectedMenu.Name),
                                                              "Services", Coalesce(Text(labels.lblServices), SelectedMenu.Name),
                                                              "Site Tasks", Coalesce(Text(labels.lblSiteTasks), SelectedMenu.Name),
                                                              SelectedMenu.Name   // already text, so safe
                                                      )
                                                  )
                                                VerticalAlign: =VerticalAlign.Middle
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width
                                    - Comment_Add_Button_Container_3:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          BorderColor: =RGBA(255, 255, 255, 0.2)
                                          BorderThickness: =TaskDashboardScreen.Size+1
