Screens:
  MaintenanceJobDetailScreen:
    Properties:
      Fill: =RGBA(246, 252, 255, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext(
            {
                IsSelectionOptionsVisible: false,
                IsVisibleUpdateStatusPopupForm: false,
                IsVisibleMoreInformationPopupForm: false,
                IsVisibleConfirmPopupForm: false,
                IsTimerStart: false
            }
        );
        UpdateContext(
            {
                CurrentMaintanenceRecord: LookUp(
                    'Maintenance Jobs',
                    'Maintenance Job' = CurrentRecord         )
            }
        );



        Reset(Timer1);

        ClearCollect(MaintenanceJobTimeEntries , Filter('Time Entries','Maintenance Job'.'Maintenance Job' = CurrentMaintanenceRecord.'Maintenance Job'));

        UpdateContext(
            {
                TimerDefaultValue: Sum(
                    MaintenanceJobTimeEntries,
                    With(
                        {
                            _duration: If(
                                IsBlank('End Time'),
                                DateDiff(
                                    'Start Time',
                                    Now(),
                                    TimeUnit.Milliseconds
                                ),
                                DateDiff(
                                    'Start Time',
                                    'End Time',
                                    TimeUnit.Milliseconds
                                )-1000
                            )
                        },
                   // RoundDown(_duration / 1000, 0) * 1000
                        _duration
                    )
                )
            }
        );
        If(
            IsEmpty(
                Filter(
                    'Time Entries',
                    'Maintenance Job'.'Maintenance Job' = CurrentMaintanenceRecord.'Maintenance Job' && 'Status Reason' = 'Status Reason (Time Entries)'.Current
                )
            ),
            UpdateContext({IsTimerStart: false}),
            UpdateContext({IsTimerStart: true})
        );
        ClearCollect(
                    OptionsetForExternalStatus,
                    {
                        elt_name: "--Select--",
                        elt_jobstatusid: Blank()
                    },
                    ShowColumns(Filter('Job Statuses','Is Visible For Maintenance Jobs?', Status = 'Status (Job Statuses)'.Active), Name,'Job Status')
        );
    Children:
      - Image1:
          Control: Image@2.2.3
          Properties:
            BorderColor: =RGBA(0, 18, 107, 1)
            Image: =b
            Visible: =false
            X: =40
            Y: =40
