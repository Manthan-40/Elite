                            Control: Classic/Button@2.2.0
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              BorderColor: =ColorFade(Self.Fill, -15%)
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =0
                              Color: =RGBA(255,255,255,1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =Theme_OnStart.Colors.SecondaryColor
                              Font: =Font.Lato
                              Height: =If(Self.Visible,Container10_54.Height*0.7,0)
                              HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =ColorFade(Theme_OnStart.Colors.SecondaryColor, -20%)
                              OnSelect: |-
                                =UpdateContext({currentDate: Now()});

                                If(
                                    IsBlank(Reading_Value_Input.Value),
                                    Notify(
                                            Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyEnterReadingValueError),"Please enter Reading Value"),
                                        NotificationType.Error
                                    ),
                                    IsError(Value(Reading_Value_Input.Value)),
                                    Notify(
                                            Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyValidRadingValueError),"Please enter a valid number for Reading Value."),
                                        NotificationType.Error
                                    ),
                                    IfError(
                                        Patch(
                                            'Meter Readings',
                                            CurrentMeterReadingRecord,
                                            {
                                                Reading:Value(Reading_Value_Input.Value),
                                                'Reading Date': currentDate
                                            }
                                        ),
                                        Notify(
                                                Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifySomethingWentWrongError),"Something Went Wrong.Please try again"),
                                            NotificationType.Error
                                        );
                                        UpdateContext({IsVisibleConfirmPopupForm: false}),
                                        Patch(
                                            'Meter Readings',
                                            CurrentMeterReadingRecord,
                                            {
                                                Reading: Value(Reading_Value_Input.Value),
                                                'Reading Date': currentDate
                                            }
                                        );
                                        Refresh('Meter Readings');
                                        UpdateContext(
                                            {
                                                CurrentMeterReadingRecord: LookUp(
                                                    'Meter Readings',
                                                    'Meter Reading' = CurrentMeterReadingRecord.'Meter Reading'
                                                )
                                            }
                                        );
                                        Notify(
                                                Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyReadingsUpdated),"Meter readings updated"),
                                            NotificationType.Success
                                        );
                                        UpdateContext({IsVisibleConfirmPopupForm: false})
                                    )
                                )
                              PressedBorderColor: =Self.Fill
                              PressedFill: =Self.Fill
                              Size: |
                                =If(
                                    'Comment Screen'.Size <= ScreenSize.Small,
                                    22,
                                    'Comment Screen'.Size <= ScreenSize.Large,
                                    If(
                                        'Comment Screen'.Width >= 1300,
                                        34,
                                        28
                                    ),
                                    34
                                )
                              Text: |+
                                =    Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.btnSubmitMeterreadings), "Submit Meter Reading")
