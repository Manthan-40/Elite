                  Label: =    Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.lblPleaseWait), "Please Wait...")
                  LabelPosition: ='Spinner.LabelPosition'.Below
                  SpinnerSize: ='Spinner.SpinnerSize'.Huge
                  Width: =Parent.Width
