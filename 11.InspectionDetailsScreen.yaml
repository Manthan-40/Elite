                                    AlignInContainer: =AlignInContainer.Stretch
                                    BorderColor: =EliteTheme.Colors.Body_UI.BorderLight
                                    BorderRadius: =15
                                    BorderStyle: =BorderStyle.Solid
                                    BorderThickness: =2
                                    DefaultSelectedItems: |+
                                      =If(
                                          IsBlankOrError(CurrentMaintanenceRecord.'Mooring Status'),
                                          First(RequestOptionsetForMooringStatus),
                                          LookUp(RequestOptionsetForMooringStatus, NumValue = CurrentMaintanenceRecord.'Mooring Status')
                                      )
                                    FontSize: |
                                      =If(
                                          'Requests Screen'.Size <= ScreenSize.Small,
                                          26,
                                          'Requests Screen'.Size <= ScreenSize.Large,
                                          32,
                                          38
                                      )
                                    Height: =TextCanvas2_21.Height*2
                                    Items: =RequestOptionsetForMooringStatus
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    Required: =true
                                  Children:
                                    - Label1:
                                        Control: DropDownDataField@1.5.0
                                        Variant: textualColumn
                                        IsLocked: true
                                        Properties:
                                          FieldDisplayName: ="Label"
                                          FieldName: ="Label"
                                          FieldType: ="s"
                                          Order: =1
                        - Button2_4:
                            Control: Classic/Button@2.2.0
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              BorderColor: =ColorFade(Self.Fill, -15%)
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =0
                              Color: =RGBA(255,255,255,1)
                              DisabledBorderColor: =RGBA(166, 166, 166, 1)
                              Fill: =Theme_OnStart.Colors.SecondaryColor
                              Font: =Font.Lato
                              FontWeight: =FontWeight.Normal
                              Height: =Reason_Code_Input_1.Height
                              HoverBorderColor: =ColorFade(Self.BorderColor, 20%)
                              HoverColor: =RGBA(255, 255, 255, 1)
                              HoverFill: =ColorFade(Theme_OnStart.Colors.SecondaryColor, -20%)
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              OnSelect: |-
                                =UpdateContext({IsLoaderVisible:true});
                                If(
                                        IsBlankOrError(Reason_Code_Input_1.Selected) ||IsBlank(Reason_Code_Input_1.Selected.NumValue),
                                    UpdateContext({IsLoaderVisible:false});
                                    Notify(
                                            Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyEnterMooringStatusError),"Please enter mooring status"),
                                        NotificationType.Error
                                    ),
                                    IfError(
                                        Patch(
                                            'Inspections',
                                             LookUp(Inspections, Inspection = CurrentMaintanenceRecord.Inspection),
                                            {
                                                'Mooring Status': Reason_Code_Input_1.Selected.NumValue
                                            }
                                        ),
                                        UpdateContext({IsLoaderVisible:false});
                                        Notify(
                                    Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifySomethingWentWrongError),"Something Went Wrong. Please try again"),            NotificationType.Error
                                        );
                                        UpdateContext({IsVisibleConfirmPopupForm: false}),
                                        Patch(
                                            'Inspections',
                                            LookUp(Inspections, Inspection = CurrentMaintanenceRecord.Inspection),
                                            {
                                                'Mooring Status': Reason_Code_Input_1.Selected.NumValue
                                            }
                                        );
                                        Refresh('Inspections');
                                        UpdateContext(
                                            {
                                                CurrentMaintanenceRecord:  LookUp(Inspections, Inspection = CurrentMaintanenceRecord.Inspection)
                                            }
                                        );
                                        Notify(
                                            Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyMooringStatusUpdate),"Mooring status updated."),
                                            NotificationType.Success
                                        );
                                        UpdateContext({IsLoaderVisible:false});
                                        UpdateContext({IsMooringStatusPopupOpen: false})
                                    )
                                );
                              PressedBorderColor: =Self.Fill
                              PressedFill: =Self.Fill
                              Size: |
                                =If(
                                    'Requests Screen'.Size <= ScreenSize.Small,
                                    21,
                                    'Requests Screen'.Size <= ScreenSize.Large,
                                    If(
                                        'Requests Screen'.Width >= 1300,
                                        33,
                                        27
                                    ),
                                    33
                                )
                              Text: =    Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.btnUpdate), "Update")
