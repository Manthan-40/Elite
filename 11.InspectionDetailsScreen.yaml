                      Variant: AutoLayout
                      Properties:
                        FillPortions: =0
                        Height: |+
                          =(Container10_19.Height+Button2_4.Height)*1.25
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =20
