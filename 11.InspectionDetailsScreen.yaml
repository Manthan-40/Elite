                                  Control: Text@0.0.51
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    AutoHeight: =true
                                    Font: =Font.Lato
                                    LayoutMinHeight: =16
                                    LayoutMinWidth: =16
                                    PaddingLeft: =13
