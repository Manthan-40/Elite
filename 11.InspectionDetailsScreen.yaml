                                          40
                                      )
                                    Text: =Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.lblMooringStatus),"Mooring Status")
                                    Weight: ='TextCanvas.Weight'.Bold
