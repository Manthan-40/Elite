                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        PaddingBottom: =Self.PaddingTop
                        PaddingLeft: =30
                        PaddingRight: =Self.PaddingLeft
                        PaddingTop: =20
                      Children:
                        - Container10_19:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
