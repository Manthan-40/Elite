                IsVisibleAddRequestPopupForm: false,
                IsVisibleMoreInformationPopupForm: false,
                IsVisibleConfirmPopupForm: false,
                IsVisibleTaskPopupForm: false,
                IsTimerStart: false,
                IsMooringStatusPopupOpen: false
            }
        );
        UpdateContext(
            {
                CurrentMaintanenceRecord: LookUp(
                    Inspections,
                    Inspection = CurrentRecord
                )
            }
        );
        Set(TasksData, Task);
        /*ClearCollect(
                    RequestOptionsetForReasonCode,
                    {
                        elt_name: "--Select--",
                        elt_requesttypeid: Blank()
                    },
                    ShowColumns(
                        'Reason Codes', Name,'Reason Code'
                    )
                )
        ;*/
        ClearCollect(
                    RequestOptionsetForMooringStatus,
                    {
                        Label: "--Select--",
                        NumValue : Blank()
                    }
        );
        ForAll( Choices('Mooring Status (Inspections)'),Collect(RequestOptionsetForMooringStatus,{Label: Text(ThisRecord.Value), NumValue : ThisRecord.Value}));
        ClearCollect(
                    RequestOptionsetForReasonCode,
                    {
                        elt_name: "--Select--",
                        elt_reasoncodeid: Blank()
                    },
                    ShowColumns(Filter('Reason Codes','Type Code' = CurrentMaintanenceRecord.'Type Code​',Status = 'Status (Reason Codes)'.Active), Name, 'Reason Code')
        )
