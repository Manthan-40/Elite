                                =Switch('Requests Screen'.Size,ScreenSize.Small,Min(Comment_PopupForm_Header_Title_20.Height,50),ScreenSize.Medium,Min(Comment_PopupForm_Header_Title_20.Height,60),Min(Comment_PopupForm_Header_Title_20.Height,70))

