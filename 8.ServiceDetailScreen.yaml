Screens:
  ServiceDetailScreen:
    Properties:
      Fill: =RGBA(246, 252, 255, 1)
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =UpdateContext(
            {
                IsSelectionOptionsVisible: false,
                IsVisibleAddRequestPopupForm: false,
                IsVisibleMoreInformationPopupForm: false,
                IsVisibleConfirmPopupForm: false,
                IsVisibleTaskPopupForm: false,
                IsTimerStart: false,
                IsLoaderVisible:false,
                TimerDefaultValue:0
            }
        );
        UpdateContext(
            {
                CurrentMaintanenceRecord: LookUp(
                    Services_1,
                   Service = CurrentRecord
                )
            }
        );
        Reset(Timer1_2);

        // Initialize control variables
        UpdateContext({
            CanAccessPause: false,
            CanAccessStart: true,
            CanAccessComplete: false,
            IsTimerStart: false,
            TimerDefaultValue: 0
        });

        Clear(colServiceTimeEntries);
        // Load existing time entries and set initial state
        ClearCollect(
            colServiceTimeEntries,
            Filter(
                'Time Entries',
                Service.Service = CurrentMaintanenceRecord.Service
            )
        );

        // Check if there's a current active time entry
        UpdateContext({
            varCurrentTimeEntry: LookUp(
                colServiceTimeEntries,
                'Status Reason' = 'Status Reason (Time Entries)'.Current && !IsBlank('Start Time'),
                'Time Entry'
            )
        });

        // Set button states based on existing entries
        UpdateContext({
            CanAccessStart: IsBlank(varCurrentTimeEntry),
            CanAccessPause: !IsBlank(varCurrentTimeEntry),
            CanAccessComplete: CountRows(colServiceTimeEntries) > 0,
            IsTimerStart: !IsBlank(varCurrentTimeEntry)
        });

        // Calculate timer default value
        UpdateContext({
            TimerDefaultValue: Sum(
                colServiceTimeEntries,
                If(
                    'Status Reason' = 'Status Reason (Time Entries)'.Past,
                    DateDiff('Start Time', 'End Time', TimeUnit.Milliseconds),
                    DateDiff('Start Time', Now(), TimeUnit.Milliseconds)
                )
            )
        });

        Set(TasksData, Task);
