                                                Height: =Self.Size*2.25
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                Size: |+
                                                  =If (TaskDashboardScreen.Size <= ScreenSize.Small , 30 ,TaskDashboardScreen.Size <= ScreenSize.Medium,50,70)

                                                Text: |-
                                                  =With(
                                                      {
                                                          labels: LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels
                                                      },
                                                      Switch(
                                                          ThisItem.Name,
                                                          "High Priority", Coalesce(Text(labels.lblHighPriority),ThisItem.Name),
                                                          "Next 7 days", Coalesce(Text(labels.lblNext7Days),ThisItem.Name),
                                                          "To Do", Coalesce(Text(labels.lblToDo),ThisItem.Name),
                                                          "Completed", Coalesce(Text(labels.lblCompleted),ThisItem.Name),
                                                          "All", Coalesce(Text(labels.lblAll),ThisItem.Name),
                                                          ThisItem.Name   // already text, so safe
                                                      )
                                                  )
                                                VerticalAlign: =VerticalAlign.Bottom
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width
                                    - TaskDashBoard_Nevigation_Button:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Transparent
                                          Height: =TaskDashboard_DataTiles_container.Height
                                          OnSelect: |-
                                            =If(
                                                Value(ThisItem.FilteredRecordsCount)<=0,
                                                Notify(Coalesce(Text(LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels.notifyNoTasksToDisplay), "There are currently no tasks to display."), NotificationType.Warning),
                                                Set(Filter,ThisItem.Name);
                                                Navigate(MaintenanceScreen, ScreenTransition.Fade);

                                            );
                                          Text: =
                                          Width: =TaskDashboard_DataTiles_container.Width
                                          X: =TaskDashboard_DataTiles_container.X
                                          Y: =TaskDashboard_DataTiles_container.Y
      - Housekeeping_Loader_Container_3:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            Fill: =RGBA(0, 0, 0, 0.7)
            Height: =Parent.Height
            Visible: =IsSpinnerVisible
            Width: =Parent.Width
          Children:
            - Spinner1_7:
                Control: Spinner@1.4.6
                Properties:
                  BasePaletteColor: =Theme_OnStart.Colors.PrimaryColor
                  FontColor: =RGBA(255, 255, 255, 1)
