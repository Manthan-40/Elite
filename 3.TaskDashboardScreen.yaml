Screens:
  TaskDashboardScreen:
    Properties:
      LoadingSpinnerColor: =EliteTheme.Colors.Body_UI.Primary
      OnHidden: =Clear(TaskGalleryItems);
      OnVisible: |+
        =UpdateContext({IsSpinnerVisible : true});
        ClearCollect(
            TaskGalleryItems,
            [
            {
                Name: "High Priority",
                FilteredRecordsCount: Switch(
                    SelectedMenu.Name,
                    "Site Tasks", 
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Site Tasks', !IsBlank('Site Task') && Status = 'Status (Site Tasks)'.Active && 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 )),
                        CountRows(Filter('Site Tasks', !IsBlank('Site Task') && Status = 'Status (Site Tasks)'.Active && 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4))
                    ),
                    "Safety Tests",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Safety Tests', !IsBlank('Safety Test'), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active )),
                        CountRows(Filter('Safety Tests', !IsBlank('Safety Test'), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active))
                    ), 
                    "Maintenance Jobs",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Maintenance Job'), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Maintenance Jobs)'.Active)),
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Maintenance Job'), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Maintenance Jobs)'.Active))
                    ),
                    "Services",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Services_1', !IsBlank(Service), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Services_1)'.Active)),
                        CountRows(Filter('Services_1', !IsBlank(Service), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Services_1)'.Active))
                    ),
                    "Housekeeping",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Housekeeping_1', !IsBlank(Housekeeping), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Housekeeping_1)'.Active)),
                        CountRows(Filter('Housekeeping_1', !IsBlank(Housekeeping), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Housekeeping_1)'.Active))
                    ),
                    "Meter Readings",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Meter Readings', !IsBlank('Meter Reading'), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Meter Readings)'.Active)),
                        CountRows(Filter('Meter Readings', !IsBlank('Meter Reading'), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Meter Readings)'.Active))
                    ),
                    "Inspection",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Inspections', !IsBlank(Inspection), 'Owning Team'.Team in UserTeams.Team && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Inspections)'.Active)),
                        CountRows(Filter('Inspections', !IsBlank(Inspection), 'Owning User'.User = CurrentUser.User && Priority = 1 && 'Task Status' <> 4 && Status = 'Status (Inspections)'.Active))
                    )
                )
            },
            {
                Name: "To Do",
                FilteredRecordsCount: Switch(
                    SelectedMenu.Name,
                    "Site Tasks", 
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Site Tasks', !IsBlank('Due Date') && 'Due Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Site Tasks)'.Active, 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Site Tasks', !IsBlank('Due Date') && 'Due Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Site Tasks)'.Active, 'Owning User'.User = CurrentUser.User))
                    ),
                    "Safety Tests",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Safety Tests', !IsBlank('Test Date') && 'Test Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active , 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Safety Tests', !IsBlank('Test Date') && 'Test Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active , 'Owning User'.User = CurrentUser.User))
                    ),
                    "Maintenance Jobs",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Due Date') && 'Due Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4  && Status = 'Status (Maintenance Jobs)'.Active, 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Due Date') && 'Due Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4  && Status = 'Status (Maintenance Jobs)'.Active, 'Owning User'.User = CurrentUser.User))
                    ),
                    "Services",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Services_1', !IsBlank('Start Date') && 'Start Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Services_1)'.Active)),
                        CountRows(Filter('Services_1', !IsBlank('Start Date') && 'Start Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Services_1)'.Active))
                    ),
                    "Housekeeping",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Housekeeping_1', !IsBlank('Date ') && 'Date ' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Housekeeping_1)'.Active)),
                        CountRows(Filter('Housekeeping_1', !IsBlank('Date ') && 'Date ' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Housekeeping_1)'.Active))
                    ),
                    "Meter Readings",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Meter Readings', !IsBlank('Reading Date') && 'Reading Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Meter Readings)'.Active)),
                        CountRows(Filter('Meter Readings', !IsBlank('Reading Date') && 'Reading Date' <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Meter Readings)'.Active))
                    ),
                    "Inspection",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Inspections', !IsBlank(Date) && Date <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Inspections)'.Active)),
                        CountRows(Filter('Inspections', !IsBlank(Date) && Date <= DateAdd(Today(), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Inspections)'.Active))
                    )
                )
            },
            {
                Name: "Next 7 days",
                FilteredRecordsCount: Switch(
                    SelectedMenu.Name,
                    "Site Tasks", 
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Site Tasks', !IsBlank('Due Date') && 'Due Date' >= DateAdd(Today(), 1) && 'Due Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Site Tasks)'.Active, 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Site Tasks', !IsBlank('Due Date') && 'Due Date' >= DateAdd(Today(), 1) && 'Due Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Site Tasks)'.Active, 'Owning User'.User = CurrentUser.User))
                    ),
                    "Safety Tests",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Safety Tests', !IsBlank('Test Date') && 'Test Date' >= DateAdd(Today(), 1) && 'Test Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active , 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Safety Tests', !IsBlank('Test Date') && 'Test Date' >= DateAdd(Today(), 1) && 'Test Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4 && Status = 'Status (Safety Tests)'.Active , 'Owning User'.User = CurrentUser.User))
                    ),
                    "Maintenance Jobs",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Due Date') && 'Due Date' >= DateAdd(Today(), 1) && 'Due Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4  && Status = 'Status (Maintenance Jobs)'.Active, 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Maintenance Jobs', !IsBlank('Due Date') && 'Due Date' >= DateAdd(Today(), 1) && 'Due Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4  && Status = 'Status (Maintenance Jobs)'.Active, 'Owning User'.User = CurrentUser.User))
                    ),
                    "Services",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Services_1', !IsBlank('Start Date') && 'Start Date' >= DateAdd(Today(), 1) && 'Start Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Services_1)'.Active)),
                        CountRows(Filter('Services_1', !IsBlank('Start Date') && 'Start Date' >= DateAdd(Today(), 1) && 'Start Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Services_1)'.Active))
                    ),
                    "Housekeeping",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Housekeeping_1', !IsBlank('Date ') && 'Date ' >= DateAdd(Today(), 1) && 'Date ' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Housekeeping_1)'.Active)),
                        CountRows(Filter('Housekeeping_1', !IsBlank('Date ') && 'Date ' >= DateAdd(Today(), 1) && 'Date ' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Housekeeping_1)'.Active))
                    ),
                    "Meter Readings",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Meter Readings', !IsBlank('Reading Date') && 'Reading Date' >= DateAdd(Today(), 1) && 'Reading Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Meter Readings)'.Active)),
                        CountRows(Filter('Meter Readings', !IsBlank('Reading Date') && 'Reading Date' >= DateAdd(Today(), 1) && 'Reading Date' <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Meter Readings)'.Active))
                    ),
                    "Inspection",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Inspections', !IsBlank(Date) && Date >= DateAdd(Today(), 1) && Date <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Inspections)'.Active)),
                        CountRows(Filter('Inspections', !IsBlank(Date) && Date >= DateAdd(Today(), 1) && Date <= DateAdd(DateAdd(Today(), 7), 86399, TimeUnit.Seconds) && 'Task Status' <> 4, 'Owning User'.User = CurrentUser.User && Status = 'Status (Inspections)'.Active))
                    )
                )
            },
            {
                Name: "Completed",
                FilteredRecordsCount: Switch(
                    SelectedMenu.Name,
                    "Site Tasks", 
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Site Tasks', 'Task Status' = 4 && Status = 'Status (Site Tasks)'.Active && 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Site Tasks', 'Task Status' = 4 && Status = 'Status (Site Tasks)'.Active && 'Owning User'.User = CurrentUser.User))
                    ),
                    "Safety Tests",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Safety Tests', 'Task Status' = 4 && Status = 'Status (Safety Tests)'.Active && 'Owning Team'.Team in UserTeams.Team)),
                        CountRows(Filter('Safety Tests', 'Task Status' = 4 && Status = 'Status (Safety Tests)'.Active && 'Owning User'.User = CurrentUser.User))
                    ),
                    "Maintenance Jobs",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Maintenance Jobs', 'Task Status' = 4 && 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Maintenance Jobs)'.Active)),
                        CountRows(Filter('Maintenance Jobs', 'Task Status' = 4 && 'Owning User'.User = CurrentUser.User && Status = 'Status (Maintenance Jobs)'.Active))
                    ),
                    "Services",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Services_1', 'Task Status' = 4 && 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Services_1)'.Active)),
                        CountRows(Filter('Services_1', 'Task Status' = 4 && 'Owning User'.User = CurrentUser.User && Status = 'Status (Services_1)'.Active))
                    ),
                    "Housekeeping",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Housekeeping_1', 'Task Status' = 4 && 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Housekeeping_1)'.Active)),
                        CountRows(Filter('Housekeeping_1', 'Task Status' = 4 && 'Owning User'.User = CurrentUser.User && Status = 'Status (Housekeeping_1)'.Active))
                    ),
                    "Meter Readings",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Meter Readings', 'Task Status' = 4 && 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Meter Readings)'.Active)),
                        CountRows(Filter('Meter Readings', 'Task Status' = 4 && 'Owning User'.User = CurrentUser.User && Status = 'Status (Meter Readings)'.Active))
                    ),
                    "Inspection",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Inspections', 'Task Status' = 4 && 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Inspections)'.Active)),
                        CountRows(Filter('Inspections', 'Task Status' = 4 && 'Owning User'.User = CurrentUser.User && Status = 'Status (Inspections)'.Active))
                    )
                )
            },
            {
                Name: "All",
                FilteredRecordsCount: Switch(
                    SelectedMenu.Name,
                    "Site Tasks", 
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Site Tasks', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Site Tasks)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Site Tasks', 'Owning User'.User = CurrentUser.User && Status = 'Status (Site Tasks)'.Active && 'Task Status' <> 4))
                    ),
                    "Safety Tests",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Safety Tests', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Safety Tests)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Safety Tests', 'Owning User'.User = CurrentUser.User && Status = 'Status (Safety Tests)'.Active && 'Task Status' <> 4))
                    ),
                    "Maintenance Jobs",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Maintenance Jobs', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Maintenance Jobs)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Maintenance Jobs', 'Owning User'.User = CurrentUser.User && Status = 'Status (Maintenance Jobs)'.Active && 'Task Status' <> 4))
                    ),
                    "Services",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Services_1', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Services_1)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Services_1', 'Owning User'.User = CurrentUser.User && Status = 'Status (Services_1)'.Active && 'Task Status' <> 4))
                    ),
                    "Housekeeping",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Housekeeping_1', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Housekeeping_1)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Housekeeping_1', 'Owning User'.User = CurrentUser.User && Status = 'Status (Housekeeping_1)'.Active && 'Task Status' <> 4))
                    ),
                    "Meter Readings",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Meter Readings', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Meter Readings)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Meter Readings', 'Owning User'.User = CurrentUser.User && Status = 'Status (Meter Readings)'.Active && 'Task Status' <> 4))
                    ),
                    "Inspection",
                    If(
                        TaskDashboard_TaskFilter_Toggle.Value,
                        CountRows(Filter('Inspections', 'Owning Team'.Team in UserTeams.Team && Status = 'Status (Inspections)'.Active && 'Task Status' <> 4)),
                        CountRows(Filter('Inspections', 'Owning User'.User = CurrentUser.User && Status = 'Status (Inspections)'.Active && 'Task Status' <> 4))
                    )
                )
            }
        ]
        );
        UpdateContext({IsSpinnerVisible : false});

    Children:
      - TaskDashBoard_Main_Container:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =EliteTheme.Colors.Body_UI.BackgroundLight
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - TaskDashboard_Header_Container:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  FillPortions: =0
                  Height: |-
                    =//If (Home.Size <= ScreenSize.Small , Parent.Height*0.15 ,Home.Size <= ScreenSize.Large,Parent.Height*0.1,Parent.Height*0.1)
                    Parent.Height*0.12
                  RadiusBottomLeft: =40
                  RadiusBottomRight: =40
                  RadiusTopLeft: =
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - TaskDashBoard_Header_BG-Gradient_Image:
                      Control: Image@2.2.3
                      Properties:
                        BorderColor: =RGBA(0, 18, 107, 1)
                        Height: =Parent.Height
                        Image: ='BG 1'
                        ImagePosition: =ImagePosition.Tile
                        Width: =Parent.Width
                  - TaskDashBoard_Header_Wrapper_Container:
                      Control: GroupContainer@1.5.0
                      Variant: ManualLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Height: =Parent.Height
                        Width: =Parent.Width
                      Children:
                        - TaskDashBoard_Header_Wrapper_Inner_Container:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Height: =Parent.Height
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =If(HomeScreen.Size <= ScreenSize.Small ,10 ,HomeScreen.Size <= ScreenSize.Large,20,30)
                              PaddingLeft: =8
                              PaddingRight: =8
                              Width: =Parent.Width
                            Children:
                              - TaskDashBoard_Header_Back/Title_Container:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    PaddingLeft: =15
                                    PaddingRight: =15
                                    X: =40
                                    Y: =40
                                  Children:
                                    - TaskDashBoard_BackBTN_Container:
                                        Control: GroupContainer@1.5.0
                                        Variant: ManualLayout
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          BorderColor: =EliteTheme.Colors.Body_UI.GlassButton_Border
                                          BorderThickness: =TaskDashboardScreen.Size+1
                                          Fill: =EliteTheme.Colors.Body_UI.GlassButton_BG
                                          FillPortions: =0
                                          Height: =Self.Width
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          RadiusBottomLeft: =Self.RadiusTopLeft
                                          RadiusBottomRight: =Self.RadiusTopLeft
                                          RadiusTopLeft: =Self.Height*0.3
                                          RadiusTopRight: =Self.RadiusTopLeft
                                          Width: |+
                                            =If (TaskDashboardScreen.Size <= ScreenSize.Small , 70 ,TaskDashboardScreen.Size <= ScreenSize.Medium,100,130)
                                        Children:
                                          - TaskDashBoard_BackBTN_Button:
                                              Control: Button@0.0.45
                                              Properties:
                                                Align: =Align.Center
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                BasePaletteColor: =RGBA(255, 255, 255, 1)
                                                BorderColor: =RGBA(255,255,255,0.2)
                                                BorderRadius: =Self.Height*0.3
                                                BorderStyle: =BorderStyle.None
                                                FontColor: =RGBA(255, 255, 255, 1)
                                                FontSize: |+
                                                  =//If (HomeScreen.Size <= ScreenSize.Small , 40 ,HomeScreen.Size <= ScreenSize.Medium,55,70)

                                                  LookUp(EliteTheme.FontSizes.Heading, ScreenSize = TaskDashboardScreen.Size).FontSize
                                                FontWeight: =FontWeight.Bold
                                                Height: =Self.Width
                                                Icon: ="ArrowLeft"
                                                IconStyle: ='ButtonCanvas.IconStyle'.Filled
                                                OnSelect: |-
                                                  =//Notify("Back Initiated");
                                                  Back()
                                                Text: =
                                                Width: =Parent.Width
                                    - TaskDashBoard_Title_Container:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          BorderColor: =RGBA(0, 0, 0, 0)
                                          DropShadow: =DropShadow.None
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                          LayoutMinHeight: =16
                                          LayoutMinWidth: =16
                                          Width: =Parent.Width*0.2
                                        Children:
                                          - TaskDashBoard_Title_Text:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                AutoHeight: =true
                                                Font: =Font.Lato
                                                FontColor: =RGBA(255, 255, 255, 1)
                                                Height: =Self.Size + 10
                                                LayoutMinHeight: =16
                                                LayoutMinWidth: =16
                                                PaddingRight: =('TaskDashBoard_Header_Back/Title_Container'.Width-TaskDashBoard_BackBTN_Container.Width-Self.Width)
                                                Size: |-
                                                  =If(
                                                      HomeScreen.Size <= ScreenSize.Small,
                                                      45,
                                                      HomeScreen.Size <= ScreenSize.Medium,
                                                          70,
                                                      90
                                                  )
                                                Text: |-
                                                  =
                                                      With(
                                                      {
                                                          labels: LookUp(LabelTranslations, Language = UserLanguage).TranslatedLabels
                                                      },
                                                      If(
                                                          IsBlankOrError(SelectedMenu),
                                                          "There is some Error",
                                                          Switch(
                                                              SelectedMenu.Name,
                                                              "Housekeeping",Coalesce(Text(labels.lblHousekeeping), SelectedMenu.Name),
                                                              "Inspection",Coalesce(Text(labels.lblInspection), SelectedMenu.Name),
                                                              "Maintenance Jobs",Coalesce(Text(labels.lblMaintenanceJobs), SelectedMenu.Name),
                                                              "Meter Readings",Coalesce(Text(labels.lblMeterReadings), SelectedMenu.Name),
                                                              "Safety Tests",Coalesce(Text(labels.lblSafetyTests), SelectedMenu.Name),
                                                              "Services",Coalesce(Text(labels.lblServices), SelectedMenu.Name),
                                                              "Site Tasks",Coalesce(Text(labels.lblSiteTasks), SelectedMenu.Name),
                                                              SelectedMenu.Name   // already text, so safe
                                                          )
                                                      )
                                                  )
                                                VerticalAlign: =VerticalAlign.Middle
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width
            - TaskDashboard_Body_Container:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  FillPortions: =0
                  Height: =Parent.Height-TaskDashboard_Header_Container.Height
                  LayoutMinHeight: =16
                  LayoutMinWidth: =16
                Children:
                  - TaskDashboard_Data_Container:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Height: =Parent.Height
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingLeft: =
                        PaddingRight: =
                        Width: =Parent.Width
                        Y: |+
                          =0
                      Children:
                        - TaskDashboard_Filter_Wrapper_Container:
                            Control: GroupContainer@1.5.0
                            Variant: ManualLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              FillPortions: =0
                              Height: =Parent.Height*0.1
                              LayoutMinHeight: =16
                              LayoutMinWidth: =16
                              X: =40
                              Y: =40
                            Children:
                              - TaskDashboard_Filter_Container:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
